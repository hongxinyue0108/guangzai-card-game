<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>光仔卡牌分享</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="share-page panel">
        <p class="eyebrow">分享跳转检测</p>
        <h1>光仔卡牌</h1>
        <div class="share-poster">
          <div class="poster-crystal"></div>
          <h2>来抽一张名场面卡</h2>
          <p id="shareText">正在读取分享信息...</p>
          <p class="share-disclaimer">本游戏为光核训练营作业展示，仅用于技术交流与测试，非商业运营产品，不涉及充值盈利。</p>
        </div>
        <p id="rewardText" class="message"></p>
        <button id="returnGame" class="primary link-button">进入游戏</button>
      </section>
    </main>
    <script src="./share.js"></script>
  </body>
</html>
