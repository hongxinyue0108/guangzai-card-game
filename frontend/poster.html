<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>光仔卡牌二维码海报</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="poster-body">
    <main class="poster-app">
      <section class="campaign-poster">
        <div class="poster-badge">光仔卡牌</div>
        <div class="rift"></div>
        <h1>光仔卡牌<br />梗档案馆开启</h1>
        <h2>开晶核 · 集名梗 · 冲排行</h2>
        <p class="poster-copy">
          高光操作、离谱失误、社区热议与版本故事，都会凝聚成一张名场面卡。扫描二维码，成为新的梗史编纂者。
        </p>
        <div class="qr-panel">
          <img id="qrImage" alt="游戏入口二维码" />
        </div>
        <strong class="scan-text">扫码进入</strong>
        <p class="poster-slogan">截图转发海报，邀请好友一起开启记忆晶核</p>
        <p class="poster-disclaimer">光核训练营作业展示 · 仅用于技术交流与测试 · 非商业运营 · 不涉及充值盈利</p>
      </section>

      <section class="poster-tools panel">
        <label>二维码跳转地址<input id="targetUrl" /></label>
        <button id="refreshQr" class="secondary">刷新二维码</button>
        <a class="primary link-button" href="./index.html">返回游戏</a>
        <p class="hint">
          微信/QQ 里可直接截图转发海报。手机扫码演示时，请先用电脑局域网地址打开本页，例如 http://电脑IP:5173/poster.html。
        </p>
      </section>
    </main>
    <script src="./poster.js"></script>
  </body>
</html>
