<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>光仔卡牌</title>
    <link rel="stylesheet" href="./style.css?v=20260628-event-007" />
  </head>
  <body>
    <main class="app">
      <section id="authView" class="auth panel">
        <p class="eyebrow">光子宇宙 · H5 卡牌收集</p>
        <h1>光仔卡牌</h1>
        <p class="subtitle">推开名场面之殿，收集属于玩家社区的高光、冥场面和经典瞬间。</p>
        <div class="auth-card">
          <div class="segmented">
            <button id="showLogin" class="active">登录</button>
            <button id="showRegister">注册</button>
          </div>
          <label>账号<input id="nickname" placeholder="例如：hxy，只能注册一次" /></label>
          <label>密码<input id="password" type="password" placeholder="至少 3 位" /></label>
          <button id="authSubmit" class="primary">进入名场面之殿</button>
          <p id="authMessage" class="message"></p>
        </div>
      </section>

      <section id="gameView" class="game hidden">
        <header class="topbar">
          <div>
            <p class="eyebrow">拾忆者</p>
            <h2 id="nicknameText">-</h2>
          </div>
          <div class="topbar-actions">
            <button id="helpBtn" class="help-button" aria-label="查看玩法说明" title="查看玩法说明">?</button>
            <button id="logoutBtn" class="ghost">退出</button>
          </div>
        </header>

        <section class="stats">
          <div data-tour="draws"><span id="drawChances">0</span><small>抽卡次数</small></div>
          <div data-tour="heat"><span id="heat">0</span><small>热度</small></div>
          <div data-tour="reputation"><span id="reputation">0</span><small>口碑</small></div>
          <div data-tour="score"><span id="score">0</span><small>积分</small></div>
          <div data-tour="fragments"><span id="fragments">0</span><small>碎片</small></div>
          <div data-tour="collection"><span id="collection">0/0</span><small>收集</small></div>
        </section>

        <section id="homePage" class="page active">
          <div class="event-panel" data-tour="event">
            <div class="section-head compact">
              <h3>今日事件</h3>
              <span id="challengeProgress">0/3</span>
            </div>
            <div id="challengeBox" class="challenge-box"></div>
          </div>
          <div id="packStage" class="pack-stage" data-tour="pack">
            <div class="stage-aura"></div>
            <div class="spark-field" aria-hidden="true">
              <i></i><i></i><i></i><i></i><i></i><i></i>
            </div>
            <div class="portal-ring">
              <div id="crystal" class="crystal">
                <span id="crystalText">开</span>
              </div>
            </div>
            <h3>记忆晶核</h3>
            <p class="pack-copy">每次开启都会拾起一个游戏名场面。重复卡会自动转化为碎片。</p>
            <button id="drawBtn" class="primary large">开包</button>
            <p class="hint">抽满 3 包、完成分享跳转、收集新卡都能获得额外奖励。</p>
          </div>
          <div class="goal-panel">
            <div class="section-head compact">
              <h3>今日目标</h3>
              <span>完成即自动领奖</span>
            </div>
            <div id="taskList" class="task-list"></div>
          </div>
          <div class="goal-panel">
            <div class="section-head compact">
              <h3>系列收集</h3>
              <span>集齐奖励 2 抽 + 30 碎片</span>
            </div>
            <div id="seriesList" class="series-list"></div>
          </div>
        </section>

        <section id="albumPage" class="page">
          <div class="section-head">
            <h3>卡册</h3>
            <select id="albumSeries"></select>
          </div>
          <div id="cardGrid" class="card-grid"></div>
          <button id="albumInviteBtn" class="secondary page-action">邀请好友来玩</button>
        </section>

        <section id="rankPage" class="page">
          <div class="section-head">
            <h3>排行榜</h3>
            <button id="shareRankBtn" class="secondary">分享排名 · 跳转领奖</button>
          </div>
          <div id="rankingList" class="ranking"></div>
        </section>

        <nav class="tabs">
          <button class="tab active" data-page="homePage">开包</button>
          <button class="tab" data-page="albumPage" data-tour="album">卡册</button>
          <button class="tab" data-page="rankPage" data-tour="rank">排行</button>
        </nav>
      </section>

      <div id="introOverlay" class="intro-overlay hidden">
        <div class="intro-stars" aria-hidden="true"></div>
        <div class="intro-gate" aria-hidden="true"></div>
        <div class="intro-copy">
          <p class="eyebrow">名场面之殿</p>
          <h2 id="introTitle">宇宙深处，门正在开启</h2>
          <p id="introText"></p>
        </div>
        <button id="introSkip" class="intro-skip" disabled>3 秒后可跳过</button>
      </div>

      <div id="tourOverlay" class="tour-overlay hidden">
        <div id="tourSpotlight" class="tour-spotlight"></div>
        <div id="tourCard" class="tour-card">
          <p id="tourStep" class="eyebrow"></p>
          <h3 id="tourTitle"></h3>
          <p id="tourText"></p>
          <button id="tourNext" class="primary">下一步</button>
        </div>
      </div>

      <div id="modal" class="modal hidden">
        <div class="modal-card">
          <button id="closeModal" class="close">×</button>
          <div id="modalContent"></div>
        </div>
      </div>
    </main>
    <script src="./main.js?v=20260628-event-007"></script>
  </body>
</html>
